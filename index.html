<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MedMaster – Medical CBT</title>
  <link rel="stylesheet" href="style.css">

  <!--
    Supabase JS client (v2).
    Exposes the global `supabase` object used in supabase.js.
    No API key is embedded here — credentials live in supabase.js.
  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="container flex" style="justify-content: space-between; align-items: center;">
      <div>
        <h1 class="app-title">MedMaster</h1>
        <span class="app-subtitle">Preclinical CBT</span>
      </div>
    </div>
  </header>

  <nav class="main-nav" aria-label="Main Navigation">
    <div class="container nav-container">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="practice">Practice</button>
      <button class="nav-btn" data-view="exam">Exam</button>
      <button class="nav-btn" data-view="multiplayer">Multiplayer</button>
      <button class="nav-btn" data-view="history">History</button>
      <button class="nav-btn" data-view="bookmarks">Bookmarks</button>
    </div>
  </nav>

  <main class="main-content" id="app">
    <div id="view-container"></div>
  </main>

  <footer class="app-footer">
    <div class="container">
      <small>© 2026 MedMaster</small>
    </div>
  </footer>

  <!--
    Load order matters:
      1. supabase.js   — initialises the DB client and exports db helpers
      2. multiplayer.js — game-flow functions (depends on db helpers)
      3. questions.js  — question bank
      4. script.js     — App object and UI (depends on everything above)
  -->
  <script src="supabase.js"></script>
  <script src="multiplayer.js"></script>
  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
